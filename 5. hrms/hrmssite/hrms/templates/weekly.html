<html>
<head>    
    <h1 align="center" >Weekly attendance report</h1>
    {% load static %}  
    <link rel="stylesheet" href="{%static 'css/bootstrap.min.css' %}">
</head>
<body>
    <center>
    <button class='btn btn-primary' style="cursor:hand" onclick="javascript:window.close()">Close</button>
    <br><br><br>
    
    <br><br><br>           
        <table style="width:700px" border="1" cellspacing="0" cellpadding="0">
            <tr>
                <th>Employee Id</th>
                <th>Date</th>
                <th>Time In</th>
                <th>Time Out</th>
                <th>Hours</th>
            </tr>
            {% for a in attendance %}
            <tr>
                <td>
                    {{a.emp_id}}
                </td>
                <td>
                    {{a.date | date:'Y-m-d'}}
                </td>
                <td>
                    {{a.time_in | date:'H:i'}}
                </td>
                <td>
                    {{a.time_out | date:'H:i'}}
                </td>

                <td>
                    {{a.hours |floatformat:2 }}
                </td>
            </tr>

            {% endfor %}


        </table>
    </center>
</body>
</html>
